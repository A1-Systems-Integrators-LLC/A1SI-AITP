services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}"
      DJANGO_DEBUG: "${DJANGO_DEBUG:-false}"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_ENCRYPTION_KEY: "${DJANGO_ENCRYPTION_KEY:?Set DJANGO_ENCRYPTION_KEY in .env}"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8000"
      EXCHANGE_ID: "${EXCHANGE_ID:-kraken}"
      EXCHANGE_API_KEY: "${EXCHANGE_API_KEY:-}"
      EXCHANGE_API_SECRET: "${EXCHANGE_API_SECRET:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL:-}"
      FREQTRADE_API_URL: "http://host.docker.internal:8080"
      FREQTRADE_BMR_API_URL: "http://host.docker.internal:8083"
      FREQTRADE_VB_API_URL: "http://host.docker.internal:8084"
      FREQTRADE_SHORT_API_URL: "http://host.docker.internal:8085"
      FREQTRADE_GRID_API_URL: "http://host.docker.internal:8086"
      FREQTRADE_SCALP_API_URL: "http://host.docker.internal:8087"
      FREQTRADE_SENTIMENT_API_URL: "http://host.docker.internal:8088"
      FREQTRADE_REVERSAL_API_URL: "http://host.docker.internal:8089"
      FREQTRADE_USERNAME: "${FREQTRADE_USERNAME:-freqtrader}"
      FREQTRADE_PASSWORD: "${FREQTRADE_PASSWORD:-freqtrader}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@localhost}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/data:/project/backend/data
      - ./data:/project/data
      - ./models:/project/models
    init: true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
          pids: 512
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/health/?detailed=true | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    init: true
    volumes:
      - nginx-logs:/var/log/nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m
          pids: 256
        reservations:
          memory: 256m
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: a1si_aitp
      POSTGRES_USER: a1si
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a1si -d a1si_aitp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nginx-logs:
  prometheus-data:
  grafana-data:
  postgres-data:
