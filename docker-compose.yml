# A1SI-AITP DEV — Isolated development container group
#
# Port range: 4000-4099 (exclusive to dev, no overlap with prod 4100-4199)
#
# Usage:
#   docker compose up -d                                   # Core (backend + frontend)
#   docker compose --profile trading up -d                 # + Freqtrade instances
#   docker compose --profile trading up -d                 # + Freqtrade instances
#
name: aitp-dev

# ═══════════════════════════════════════════════════════════════
# Shared configuration (dev only)
# ═══════════════════════════════════════════════════════════════

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Doppler or .env}"
  DJANGO_ENCRYPTION_KEY: "${DJANGO_ENCRYPTION_KEY:?Set DJANGO_ENCRYPTION_KEY in Doppler or .env}"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
  EXCHANGE_ID: "${EXCHANGE_ID:-kraken}"
  EXCHANGE_API_KEY: "${EXCHANGE_API_KEY:-}"
  EXCHANGE_API_SECRET: "${EXCHANGE_API_SECRET:-}"
  TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
  TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
  NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL:-}"
  FREQTRADE_USERNAME: "${FREQTRADE_USERNAME:?Set FREQTRADE_USERNAME in Doppler or .env}"
  FREQTRADE_PASSWORD: "${FREQTRADE_PASSWORD:?Set FREQTRADE_PASSWORD in Doppler or .env}"
  DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
  DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@localhost}"
  DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-}"

x-backend-base: &backend-base
  build:
    context: .
    dockerfile: backend/Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./backend/data:/project/backend/data
    - ./data:/project/data
    - ./models:/project/models
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "4"
        memory: 8g
        pids: 512
      reservations:
        memory: 1g
  healthcheck:
    test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/health/?detailed=true | grep -q '\"status\":\"ok\"'"]
    interval: 15s
    timeout: 10s
    retries: 5
    start_period: 120s

x-frontend-base: &frontend-base
  build:
    context: ./frontend
    dockerfile: Dockerfile
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: 512m
        pids: 256
      reservations:
        memory: 256m

x-freqtrade-env: &freqtrade-env
  FREQTRADE__USER_DATA_DIR: "/freqtrade/user_data"
  FREQTRADE__API_SERVER__USERNAME: "${FREQTRADE_USERNAME:?Set FREQTRADE_USERNAME}"
  FREQTRADE__API_SERVER__PASSWORD: "${FREQTRADE_PASSWORD:?Set FREQTRADE_PASSWORD}"
  FREQTRADE__API_SERVER__JWT_SECRET_KEY: "${FREQTRADE__API_SERVER__JWT_SECRET_KEY:-changeme}"
  FREQTRADE__EXCHANGE__KEY: "${KRAKEN_API_KEY:-}"
  FREQTRADE__EXCHANGE__SECRET: "${KRAKEN_SECRET:-}"
  RISK_API_URL: "http://backend:8000"

x-freqtrade-base: &freqtrade-base
  image: freqtradeorg/freqtrade:stable
  profiles: ["trading"]
  volumes:
    - ./freqtrade/user_data:/freqtrade/user_data
    - ./data/processed:/freqtrade/data:ro
    - ./common:/freqtrade/common:ro
  restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# DEV Services — ports 4000-4099
# ═══════════════════════════════════════════════════════════════

services:
  # ── Core ────────────────────────────────────────────────────
  backend:
    <<: *backend-base
    container_name: aitp-dev-backend
    ports:
      - "4000:8000"
    environment:
      <<: *backend-env
      DJANGO_DEBUG: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:4001,http://localhost:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:4001,http://localhost:5173,http://localhost:4000"
      FREQTRADE_API_URL: "http://freqtrade-civ1:4080"
      FREQTRADE_BMR_API_URL: "http://freqtrade-bmr:4083"
      FREQTRADE_VB_API_URL: "http://freqtrade-vb:4084"
      INTERNAL_API_ALLOWED_IPS: "127.0.0.1,::1,172.16.0.0/12"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "a1si_aitp"
      POSTGRES_USER: "a1si"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-a1si_dev_password}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    <<: *frontend-base
    container_name: aitp-dev-frontend
    ports:
      - "4001:8080"
    volumes:
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy

  # ── Trading ─────────────────────────────────────────────────
  freqtrade-civ1:
    <<: *freqtrade-base
    container_name: aitp-dev-ft-civ1
    ports:
      - "4080:4080"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config.json.example:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy CryptoInvestorV1 --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
      FREQTRADE__TELEGRAM__TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      FREQTRADE__TELEGRAM__CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  freqtrade-bmr:
    <<: *freqtrade-base
    container_name: aitp-dev-ft-bmr
    ports:
      - "4083:4083"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config_bmr.json:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy BollingerMeanReversion --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4083/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  freqtrade-vb:
    <<: *freqtrade-base
    container_name: aitp-dev-ft-vb
    ports:
      - "4084:4084"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config_vb.json:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy VolatilityBreakout --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4084/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aitp-dev-postgres
    environment:
      POSTGRES_DB: a1si_aitp
      POSTGRES_USER: a1si
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-a1si_dev_password}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "4012:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a1si -d a1si_aitp"]
      interval: 10s
      timeout: 5s
      retries: 5

# ═══════════════════════════════════════════════════════════════
# Volumes (dev only)
# ═══════════════════════════════════════════════════════════════

volumes:
  nginx-logs:
  postgres-data:
