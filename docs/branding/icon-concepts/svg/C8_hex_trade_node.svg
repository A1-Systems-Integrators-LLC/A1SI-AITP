<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1010C0"/>
      <stop offset="55%" stop-color="#00007B"/>
      <stop offset="100%" stop-color="#00004E"/>
    </linearGradient>
    <linearGradient id="navyGradDiag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1414D2"/>
      <stop offset="60%" stop-color="#00007B"/>
      <stop offset="100%" stop-color="#00004E"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7AEEFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E7E7FF"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="0.32" cy="0.24" r="0.9">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="7" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.34"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#navyGradDiag)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#innerLight)"/>
  <g filter="url(#softShadow)">
    <polygon points="512.0,182.0 797.8,347.0 797.8,677.0 512.0,842.0 226.2,677.0 226.2,347.0" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-width="18" stroke-linejoin="round" stroke-opacity="0.9"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="420" y="482" width="20" height="142" rx="10" fill="#FFFFFF"/>
    <rect x="398" y="512" width="64" height="88" rx="22" fill="#FFFFFF"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="502" y="436" width="20" height="164" rx="10" fill="#FFFFFF"/>
    <rect x="480" y="466" width="64" height="110" rx="22" fill="#FFFFFF"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="584" y="390" width="20" height="176" rx="10" fill="url(#cyanGrad)"/>
    <rect x="562" y="420" width="64" height="120" rx="22" fill="url(#cyanGrad)"/>
  </g>
  <g filter="url(#cyanGlow)"><rect x="372" y="636" width="280" height="28" rx="14" fill="url(#cyanGrad)"/></g>
</svg>
