<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1010C0"/>
      <stop offset="55%" stop-color="#00007B"/>
      <stop offset="100%" stop-color="#00004E"/>
    </linearGradient>
    <linearGradient id="navyGradDiag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1414D2"/>
      <stop offset="60%" stop-color="#00007B"/>
      <stop offset="100%" stop-color="#00004E"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7AEEFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E7E7FF"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="0.32" cy="0.24" r="0.9">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"/>
      <feOffset dx="0" dy="7" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.34"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#navyGrad)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#innerLight)"/>
  <g filter="url(#softShadow)">
    <path d="M 366.3 238.3 A 206 206 0 0 1 657.7 238.3" stroke="#FFFFFF" stroke-width="54" stroke-linecap="round" fill="none"/>
    <path d="M 427.1 299.1 A 120 120 0 0 1 596.9 299.1" stroke="#FFFFFF" stroke-width="54" stroke-linecap="round" fill="none"/>
  </g>
  <g filter="url(#cyanGlow)"><circle cx="512" cy="384" r="30" fill="url(#cyanGrad)"/></g>
  <g filter="url(#softShadow)">
    <rect x="404" y="566" width="20" height="158" rx="10" fill="#FFFFFF"/>
    <rect x="375" y="596" width="78" height="104" rx="22" fill="#FFFFFF"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="502" y="520" width="20" height="180" rx="10" fill="#FFFFFF"/>
    <rect x="473" y="552" width="78" height="120" rx="22" fill="#FFFFFF"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="600" y="474" width="20" height="202" rx="10" fill="url(#cyanGrad)"/>
    <rect x="571" y="506" width="78" height="142" rx="22" fill="url(#cyanGrad)"/>
  </g>
  <g filter="url(#cyanGlow)"><rect x="300" y="748" width="424" height="34" rx="17" fill="url(#cyanGrad)"/></g>
</svg>
