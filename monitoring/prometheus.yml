global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'a1si-backend'
    metrics_path: '/api/metrics/'
    scheme: http
    static_configs:
      - targets: ['backend:8000']
    # Backend metrics require auth token
    params:
      token: ['${METRICS_AUTH_TOKEN}']
    scrape_interval: 30s
