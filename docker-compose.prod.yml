# A1SI-AITP PROD — Isolated production container group
#
# Port range: 4100-4199 (exclusive to prod, no overlap with dev 4000-4099)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d                                   # Core
#   docker compose -f docker-compose.prod.yml --profile trading up -d                  # + Freqtrade
#   docker compose -f docker-compose.prod.yml --profile research up -d                 # + NautilusTrader, VectorBT, Redis
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d               # + Prometheus, Grafana
#   docker compose -f docker-compose.prod.yml --profile trading --profile research --profile monitoring up -d  # Everything
#
name: aitp-prod

# ═══════════════════════════════════════════════════════════════
# Shared configuration (prod only)
# ═══════════════════════════════════════════════════════════════

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in Doppler or .env}"
  DJANGO_ENCRYPTION_KEY: "${DJANGO_ENCRYPTION_KEY:?Set DJANGO_ENCRYPTION_KEY in Doppler or .env}"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
  EXCHANGE_ID: "${EXCHANGE_ID:-kraken}"
  EXCHANGE_API_KEY: "${EXCHANGE_API_KEY:-}"
  EXCHANGE_API_SECRET: "${EXCHANGE_API_SECRET:-}"
  TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
  TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
  NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL:-}"
  FREQTRADE_USERNAME: "${FREQTRADE_USERNAME:?Set FREQTRADE_USERNAME in Doppler or .env}"
  FREQTRADE_PASSWORD: "${FREQTRADE_PASSWORD:?Set FREQTRADE_PASSWORD in Doppler or .env}"
  DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME:-admin}"
  DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL:-admin@localhost}"
  DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD:-}"

x-backend-base: &backend-base
  build:
    context: .
    dockerfile: backend/Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./backend/data:/project/backend/data
    - ./data:/project/data
    - ./models:/project/models
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "4"
        memory: 8g
        pids: 512
      reservations:
        memory: 1g
  healthcheck:
    test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/health/?detailed=true | grep -q '\"status\":\"ok\"'"]
    interval: 15s
    timeout: 10s
    retries: 5
    start_period: 120s

x-frontend-base: &frontend-base
  build:
    context: ./frontend
    dockerfile: Dockerfile
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: 512m
        pids: 256
      reservations:
        memory: 256m

x-freqtrade-env: &freqtrade-env
  FREQTRADE__USER_DATA_DIR: "/freqtrade/user_data"
  FREQTRADE__API_SERVER__USERNAME: "${FREQTRADE_USERNAME:?Set FREQTRADE_USERNAME}"
  FREQTRADE__API_SERVER__PASSWORD: "${FREQTRADE_PASSWORD:?Set FREQTRADE_PASSWORD}"
  FREQTRADE__API_SERVER__JWT_SECRET_KEY: "${FREQTRADE__API_SERVER__JWT_SECRET_KEY:?Set JWT secret}"
  FREQTRADE__EXCHANGE__KEY: "${KRAKEN_API_KEY:-}"
  FREQTRADE__EXCHANGE__SECRET: "${KRAKEN_SECRET:-}"
  RISK_API_URL: "http://backend:8000"

x-freqtrade-base: &freqtrade-base
  image: freqtradeorg/freqtrade:stable
  profiles: ["trading"]
  volumes:
    - ./freqtrade/user_data:/freqtrade/user_data
    - ./data/processed:/freqtrade/data:ro
    - ./common:/freqtrade/common:ro
  restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# PROD Services — ports 4100-4199
# ═══════════════════════════════════════════════════════════════

services:
  # ── Core ────────────────────────────────────────────────────
  backend:
    <<: *backend-base
    container_name: aitp-prod-backend
    ports:
      - "4100:8000"
    environment:
      <<: *backend-env
      DJANGO_DEBUG: "false"
      CORS_ALLOWED_ORIGINS: "http://localhost:4101"
      CSRF_TRUSTED_ORIGINS: "http://localhost:4101,http://localhost:4100"
      FREQTRADE_API_URL: "http://freqtrade-civ1:4180"
      FREQTRADE_BMR_API_URL: "http://freqtrade-bmr:4183"
      FREQTRADE_VB_API_URL: "http://freqtrade-vb:4184"
      NAUTILUS_WORKER_URL: "http://nautilus:4090"
      VECTORBT_WORKER_URL: "http://vectorbt:4092"
      INTERNAL_API_ALLOWED_IPS: "127.0.0.1,::1,172.16.0.0/12"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "a1si_aitp"
      POSTGRES_USER: "a1si"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for production}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    <<: *frontend-base
    container_name: aitp-prod-frontend
    ports:
      - "4101:8080"
    volumes:
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy

  # ── Trading ─────────────────────────────────────────────────
  freqtrade-civ1:
    <<: *freqtrade-base
    container_name: aitp-prod-ft-civ1
    ports:
      - "4180:4180"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config.json.example:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy CryptoInvestorV1 --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
      FREQTRADE__API_SERVER__LISTEN_PORT: "4180"
      FREQTRADE__TELEGRAM__TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      FREQTRADE__TELEGRAM__CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4180/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  freqtrade-bmr:
    <<: *freqtrade-base
    container_name: aitp-prod-ft-bmr
    ports:
      - "4183:4183"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config_bmr.json:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy BollingerMeanReversion --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
      FREQTRADE__API_SERVER__LISTEN_PORT: "4183"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4183/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  freqtrade-vb:
    <<: *freqtrade-base
    container_name: aitp-prod-ft-vb
    ports:
      - "4184:4184"
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config_vb.json:/freqtrade/config.json:ro
      - ./data/processed:/freqtrade/data:ro
      - ./common:/freqtrade/common:ro
    command: trade --config /freqtrade/config.json --strategy VolatilityBreakout --strategy-path /freqtrade/user_data/strategies
    environment:
      <<: *freqtrade-env
      FREQTRADE__API_SERVER__LISTEN_PORT: "4184"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4184/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Research ────────────────────────────────────────────────
  nautilus:
    build:
      context: .
      dockerfile: nautilus/Dockerfile
    container_name: aitp-prod-nautilus
    profiles: ["research", "trading"]
    ports:
      - "4190:4090"
    volumes:
      - ./data/processed:/project/data/processed
      - ./nautilus/results:/project/nautilus/results
      - ./common:/project/common:ro
      - ./configs:/project/configs:ro
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
        reservations:
          memory: 512m

  vectorbt:
    build:
      context: .
      dockerfile: research/Dockerfile
    container_name: aitp-prod-vectorbt
    profiles: ["research", "trading"]
    ports:
      - "4192:4092"
    volumes:
      - ./data/processed:/project/data/processed
      - ./research/results:/project/research/results
      - ./common:/project/common:ro
      - ./configs:/project/configs:ro
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4g
        reservations:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: aitp-prod-redis
    profiles: ["trading", "research"]
    ports:
      - "4113:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Monitoring ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aitp-prod-prometheus
    profiles: ["monitoring"]
    ports:
      - "4110:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    container_name: aitp-prod-grafana
    profiles: ["monitoring"]
    ports:
      - "4111:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme_in_production}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aitp-prod-postgres
    environment:
      POSTGRES_DB: a1si_aitp
      POSTGRES_USER: a1si
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD for production}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "4112:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a1si -d a1si_aitp"]
      interval: 10s
      timeout: 5s
      retries: 5

# ═══════════════════════════════════════════════════════════════
# Volumes (prod only — completely isolated from dev)
# ═══════════════════════════════════════════════════════════════

volumes:
  nginx-logs:
  prometheus-data:
  grafana-data:
  redis-data:
  postgres-data:
